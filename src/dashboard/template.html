<title>The natural band · design reference envelope</title>

  .ov-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; font-family: var(--mono); font-size: 11px; color: var(--mist);
    padding: 3px 6px; border-radius: 5px; cursor: pointer; }
  .ov-row:hover { background: var(--panel); color: var(--bone); }
  .ov-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ov-row .cut { color: var(--mist-dim); flex: none; }
  .ov-row .cut.hit { color: var(--design-out); }
  .ov-row.thr .name { color: var(--design); }
  .ov-hint { font-family: var(--mono); font-size: 11px; color: var(--mist-dim); line-height: 1.5; }

  /* tooltip */
  #tip { position: fixed; z-index: 60; pointer-events: none; opacity: 0; transform: translate(-50%, -100%) translateY(-10px);
    background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 8px; padding: 9px 11px; font-family: var(--mono);
    font-size: 11px; color: var(--bone); box-shadow: 0 14px 38px rgba(0,0,0,0.55); max-width: 340px; transition: opacity .1s; line-height: 1.5; }
  #tip .t-title { color: var(--design); margin-bottom: 6px; letter-spacing: 0.02em; }
  #tip .t-expl { color: var(--bone); white-space: normal; } #tip table { border-collapse: collapse; }
  #tip td { padding: 1px 0; } #tip td.k { color: var(--mist); padding-right: 14px; } #tip td.v { text-align: right; color: var(--bone); }
  #tip .sep { height: 1px; background: var(--line); margin: 5px 0; }

  /* load reveal */
  .metric { opacity: 0; transform: translateY(8px); animation: rise .5s cubic-bezier(.2,.7,.3,1) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  @keyframes drop { from { opacity: 0; transform: translateY(-9px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .metric { animation: none; opacity: 1; transform: none; } .needle-anim { animation: none; } }
  @media (max-width: 1080px) { .shell { grid-template-columns: 1fr; } nav.side, aside.overview { position: static; max-height: none; }
    nav.side ul { flex-direction: row; flex-wrap: wrap; } }
</style>

<script>
(function () {
  "use strict";
  const D = window.__DATA__;
  const SOURCE_KEYS = Object.keys(D.sources);
  const SETS = D.design_sets || [];
  const INFO = D.metric_info || {};
  const CAT_OF = D.metric_category || {};
  const CAT_ORDER = D.category_order || ["Other"];
  const STRATS = [["none", "none"], ["substrate", "substrate"], ["first_cyclization", "1st cyclization"], ["domain_architecture", "domain arch."]];
  const MAX_STRATA = 8, MAX_CATS = 8;

  const BOOL_COLORS = { "True": "#7fc6b6", "true": "#7fc6b6", "False": "#274b50", "false": "#274b50" };
  // distinct outline colours for multiple design sets (avoid amber/ember — reserved for fill)
  const SET_PALETTE = ["#46c9e0", "#e878b4", "#86d46b", "#b18cff", "#5b9bff", "#eef3f1"];

  const state = {
    source: SOURCE_KEYS[0], labeling: "none", query: "",
    designs: SETS.length > 0,                       // on by default if any set loaded
    thresholds: {},                                 // "metric::col" -> {min,max}
    setColors: {},                                  // set index -> hex override
  };

  const $ = (s, r) => (r || document).querySelector(s);
  const el = (t, cls, txt) => { const e = document.createElement(t); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
  const SVGNS = "http://www.w3.org/2000/svg";

  function fmt(v) {

    const a = Math.abs(v);
    if (a === 0) return "0";
    if (a >= 1000) return v.toFixed(0);
    if (a >= 100) return v.toFixed(1);

    if (a >= 0.01) return v.toFixed(3);
    return v.toPrecision(2);
  }

  // ---------- design-set helpers ----------
  const multiSet = () => SETS.length > 1;
  function setColor(i) { return multiSet() ? (state.setColors[i] || SET_PALETTE[i % SET_PALETTE.length]) : null; }
  function designSetsFor(cname) {
    if (!state.designs) return [];
    const out = [];
    SETS.forEach((ds, i) => { const v = ds.values[cname]; if (v) out.push({ vals: v, color: setColor(i), name: ds.name }); });
    return out;
  }
  function hasDesign(cname) { return state.designs && SETS.some((ds) => ds.values[cname]); }
  function allDesignVals(cname) { return designSetsFor(cname).reduce((a, s) => a.concat(s.vals), []); }

  // effective filter band for a numeric column: custom threshold if set, else p1–p99.
  function effBand(mname, cname, col) {

    const hasMin = t.min != null && isFinite(t.min), hasMax = t.max != null && isFinite(t.max);

    const ident = $("#ident"); ident.innerHTML = "";

    add("set", (D.reference_set || "marts_db").toUpperCase());
    ident.append(el("span", "dot", "·")); add("release", D.release || "—");
    ident.append(el("span", "dot", "·")); add("n", n != null ? n.toLocaleString() + unit : "—");
  }
  function renderLegend() {
    const L = $("#legend"); L.innerHTML = "";
    const anat = el("div", "grp"); anat.append(el("span", null, "natural band"));
    const bar = el("span", "anat");
    [["var(--band-out)", 24], ["var(--band-mid)", 18], ["var(--band-core)", 14], ["var(--band-mid)", 18], ["var(--band-out)", 24]]
      .forEach(([c, w]) => { const s = el("span"); s.style.cssText = `width:${w}px;height:13px;background:${c}`; bar.append(s); });
    anat.append(bar); anat.append(el("span", null, "p1·p5·p25–p75·p95·p99"));
    const med = el("div", "grp"); med.append(el("span", "med")); med.append(el("span", null, "median"));
    const dz = el("div", "grp"); dz.append(el("span", "needle")); dz.append(el("span", null, "design · in band"));
    const dzo = el("div", "grp"); dzo.append(el("span", "needle out")); dzo.append(el("span", null, "outside band"));
    L.append(anat, med, dz, dzo);
  }
  function buildSegs() {
    const ss = $("#seg-source"); ss.innerHTML = "";
    SOURCE_KEYS.forEach((k) => { const b = el("button", null, D.sources[k].label || k); b.setAttribute("aria-pressed", k === state.source);
      b.onclick = () => { state.source = k; renderAll(); }; ss.append(b); });
    const st = $("#seg-strat"); st.innerHTML = "";
    STRATS.forEach(([k, lab]) => { const b = el("button", null, lab); b.setAttribute("aria-pressed", k === state.labeling);
      b.onclick = () => { state.labeling = k; renderAll(); }; st.append(b); });
  }
  function setupDesignToggle() {

    if (!SETS.length) { t.classList.add("disabled"); t.setAttribute("aria-disabled", "true"); lab.textContent = "none loaded"; return; }
    const total = SETS.reduce((a, s) => a + s.n, 0);

  $("#search").addEventListener("input", (e) => { state.query = e.target.value.trim().toLowerCase(); renderAll(); });

  // ---------- data helpers ----------
  function metricsOf(srcKey) { return D.sources[srcKey].metrics; }
  function matchesQuery(mname, cols) {

  }
  function strataFor(col) {

  }

  // ---------- numeric track ----------
  function axisDomain(col, dvals) {
    let lo = col.min, hi = col.max;
    if (lo == null || hi == null) { const pool = [col.p1, col.p99, col.median].filter((x) => x != null);
      lo = lo != null ? lo : Math.min.apply(null, pool); hi = hi != null ? hi : Math.max.apply(null, pool); }
    if (dvals) dvals.forEach((v) => { if (v != null && isFinite(v)) { lo = Math.min(lo, v); hi = Math.max(hi, v); } });
    if (!(isFinite(lo) && isFinite(hi))) return [0, 1];
    if (lo === hi) { const p = Math.abs(lo) * 0.05 || 0.5; return [lo - p, hi + p]; }
    const pad = (hi - lo) * 0.04; return [lo - pad, hi + pad];
  }
  function drawNumericBand(svg, col, dom, opts) {
    const W = svg.clientWidth || svg.parentNode.clientWidth || 600, H = opts.height, PAD = 9;
    const x = (v) => PAD + (v - dom[0]) / (dom[1] - dom[0]) * (W - 2 * PAD), cy = H / 2;
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.setAttribute("height", H);
    const rect = (a, b, h, fill) => { if (a == null || b == null) return; const xa = x(Math.min(a, b)), xb = x(Math.max(a, b));
      svg.append(svgEl("rect", { x: xa, y: cy - h / 2, width: Math.max(xb - xa, 1), height: h, rx: 2, fill })); };
    const big = opts.big, hOut = big ? 13 : 10, hMid = big ? 19 : 15, hCore = big ? 26 : 21;
    if (col.min != null && col.max != null) {
      svg.append(svgEl("line", { x1: x(col.min), y1: cy, x2: x(col.max), y2: cy, stroke: "var(--whisker)", "stroke-width": 1, opacity: 0.5 }));
      [col.min, col.max].forEach((v) => svg.append(svgEl("line", { x1: x(v), y1: cy - 5, x2: x(v), y2: cy + 5, stroke: "var(--whisker)", "stroke-width": 1, opacity: 0.7 })));
    }
    rect(col.p1, col.p99, hOut, "var(--band-out)"); rect(col.p5, col.p95, hMid, "var(--band-mid)"); rect(col.p25, col.p75, hCore, "var(--band-core)");
    if (col.mean != null) { const mx = x(col.mean), r = 3;
      svg.append(svgEl("path", { d: `M${mx} ${cy - r} L${mx + r} ${cy} L${mx} ${cy + r} L${mx - r} ${cy} Z`, fill: "none", stroke: "var(--mist)", "stroke-width": 1, opacity: 0.8 })); }
    if (col.median != null) svg.append(svgEl("line", { x1: x(col.median), y1: cy - hCore / 2 - 3, x2: x(col.median), y2: cy + hCore / 2 + 3, stroke: "var(--median)", "stroke-width": 2, "stroke-linecap": "round" }));
    // custom-threshold guide lines (dashed amber) when set
    const eff = opts.eff;
    if (eff && eff.custom) [eff.hasMin ? eff.min : null, eff.hasMax ? eff.max : null].forEach((v) => {
      if (v != null && isFinite(v)) svg.append(svgEl("line", { x1: x(v), y1: 2, x2: x(v), y2: H - 2, stroke: "var(--design)", "stroke-width": 1, "stroke-dasharray": "2 2", opacity: 0.7 }));
    });
    // design needles, per set (outline = set colour), fill = in/out of effective band
    if (opts.dsets && opts.dsets.length) {
      const total = opts.dsets.reduce((a, s) => a + s.vals.filter((v) => v != null && isFinite(v)).length, 0);
      let gi = 0;
      opts.dsets.forEach((ds) => ds.vals.forEach((v) => {
        if (v == null || !isFinite(v)) return;
        const out = v < eff.min || v > eff.max;
        const jy = total > 1 ? ((gi % 5) - 2) * (big ? 3.0 : 2.2) : 0;
        const c = svgEl("circle", { cx: x(v), cy: cy + jy, r: 3, fill: out ? "var(--design-out)" : "var(--design)",
          stroke: ds.color || "var(--ink)", "stroke-width": ds.color ? 1.4 : 0.8, opacity: 0.92 });
        if (animate) { c.classList.add("needle-anim"); c.style.animationDelay = Math.min(gi * 12, 400) + "ms"; }
        svg.append(c); gi++;
      }));
    }
  }
  function drawAxis(svg, dom) {
    const W = svg.clientWidth || svg.parentNode.clientWidth || 600, H = 18, PAD = 9;
    const x = (v) => PAD + (v - dom[0]) / (dom[1] - dom[0]) * (W - 2 * PAD);
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.setAttribute("height", H);
    svg.append(svgEl("line", { x1: PAD, y1: 3, x2: W - PAD, y2: 3, stroke: "var(--line-2)", "stroke-width": 1 }));
    const N = 5;
    for (let i = 0; i < N; i++) { const v = dom[0] + (dom[1] - dom[0]) * i / (N - 1), xv = x(v);
      svg.append(svgEl("line", { x1: xv, y1: 3, x2: xv, y2: 7, stroke: "var(--line-2)", "stroke-width": 1 }));
      const t = svgEl("text", { x: xv, y: 16, fill: "var(--mist-dim)", "font-size": 9.5, "font-family": "var(--mono)", "text-anchor": i === 0 ? "start" : i === N - 1 ? "end" : "middle" });
      t.textContent = fmt(v); svg.append(t); }
  }
  function statsTip(title, col, extra) {
    const rows = [["count", col.count], ["max", col.max], ["p99", col.p99], ["p95", col.p95], ["p75", col.p75], ["median", col.median],
                  ["p25", col.p25], ["p5", col.p5], ["p1", col.p1], ["min", col.min], ["mean", col.mean], ["std", col.std]];
    let h = `<div class="t-title">${title}</div><table>`;
    rows.forEach(([k, v]) => { if (v == null) return; h += `<tr><td class="k">${k}</td><td class="v">${k === "count" ? v : fmt(v)}</td></tr>`; });
    h += "</table>"; if (extra) h += `<div class="sep"></div>${extra}`; return h;
  }
  const tip = $("#tip");
  function showTip(html, ev) { tip.innerHTML = html; tip.style.left = ev.clientX + "px"; tip.style.top = ev.clientY + "px"; tip.style.opacity = "1"; }
  function hideTip() { tip.style.opacity = "0"; }
  function esc(s) { return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

  function numericColumn(colWrap, mname, cname, col) {
    const dsets = designSetsFor(cname), has = hasDesign(cname);
    if (col.band_missing && !has) { colWrap.append(el("div", "more-note", "no reference band · enable Designs to view the batch values")); return; }
    const dom = axisDomain(col, (state.designs || col.band_missing) ? allDesignVals(cname) : null);
    const eff = effBand(mname, cname, col);
    const strata = strataFor(col);
    const axisRow = el("div", "axis-row"); axisRow.append(el("div"));
    const axisHold = el("div", "track"); const asvg = svgEl("svg"); axisHold.append(asvg); axisRow.append(axisHold); colWrap.append(axisRow);
    registerDraw(() => drawAxis(asvg, dom));

    const addTrack = (label, count, statCol, isOverall, withDesign) => {
      const showDesign = withDesign != null ? withDesign : has;
      const row = el("div", "track-row");
      const lab = el("div", "strat-label" + (isOverall ? " overall" : "")); lab.append(el("span", null, label));
      if (count != null) lab.append(el("span", "ct", count.toLocaleString())); row.append(lab);
      const hold = el("div", "track"); const s = svgEl("svg"); hold.append(s); row.append(hold); colWrap.append(row);
      const big = isOverall && !strata, h = big ? 38 : 30;
      registerDraw(() => drawNumericBand(s, statCol, dom, { height: h, big, dsets: showDesign ? dsets : null, eff }));
      row.addEventListener("mousemove", (e) => showTip(statsTip(`${cname}${isOverall ? "" : " · " + label}`, statCol), e));
      row.addEventListener("mouseleave", hideTip);

      if (strata.length > MAX_STRATA) { const rest = strata.length - MAX_STRATA;
        const restN = strata.slice(MAX_STRATA).reduce((a, [, s]) => a + (s.count || 0), 0);
        colWrap.append(el("div", "more-note", `+ ${rest} smaller ${state.labeling.replace("_", " ")} strata (${restN.toLocaleString()}) not shown`)); }
    } else { addTrack(col.band_missing ? "designs" : "all", col.band_missing ? null : col.count, col, true); }
  }

  // ---------- categorical column ----------
  function topCats(freq) { const e = Object.entries(freq || {}).sort((a, b) => b[1] - a[1]); const shown = e.slice(0, MAX_CATS);
    const rest = e.slice(MAX_CATS).reduce((a, [, n]) => a + n, 0); if (rest > 0) shown.push(["other", rest]); return shown; }
  function colorForCats(catNames) { const isBool = catNames.every((c) => c in BOOL_COLORS || c === "other"); const m = {};
    catNames.forEach((c, i) => { m[c] = c === "other" ? "var(--line-2)" : (isBool ? BOOL_COLORS[c] : CAT_RAMP[i % CAT_RAMP.length]); }); return m; }
  function freqFromVals(vals) { const f = {}; vals.forEach((v) => { if (v == null) return; const k = String(v); f[k] = (f[k] || 0) + 1; }); return f; }
  function stackBar(freq, colorMap) { const total = Object.values(freq).reduce((a, b) => a + b, 0); const bar = el("div", "catbar");
    Object.entries(freq).sort((a, b) => b[1] - a[1]).forEach(([k, n]) => { const s = el("span"); s.style.width = (100 * n / (total || 1)) + "%";
      s.style.background = colorMap[k] || "var(--line-2)"; s.title = `${k}: ${n} (${(100 * n / (total || 1)).toFixed(1)}%)`; bar.append(s); }); return bar; }

  function categoricalColumn(colWrap, mname, cname, col) {
    const refTop = topCats(col.frequencies); const catNames = refTop.map(([k]) => k);
    const dsets = designSetsFor(cname);
    dsets.forEach((ds) => Object.keys(freqFromVals(ds.vals)).forEach((k) => { if (!catNames.includes(k) && !catNames.includes("other")) catNames.push(k); }));
    const colorMap = colorForCats(catNames);
    const wrap = el("div", "catbar-wrap"); const strata = strataFor(col);
    const allowed = new Set(catNames);
    const addCatRow = (label, count, freq, isDesign) => {
      const row = el("div", "catrow"); const rl = el("div", "rl" + (isDesign ? " designs" : "")); rl.append(el("span", null, label));
      if (count != null) rl.append(el("span", "ct", count.toLocaleString())); row.append(rl);
      const folded = {}; Object.entries(freq).forEach(([k, n]) => { const key = allowed.has(k) ? k : "other"; folded[key] = (folded[key] || 0) + n; });
      row.append(stackBar(folded, colorMap)); wrap.append(row);
    };
    if (col.band_missing) { if (!dsets.length) { colWrap.append(el("div", "more-note", "no reference band · enable Designs to view the batch values")); return; } }
    else if (strata) { strata.slice(0, MAX_STRATA).forEach(([name, s]) => addCatRow(name, s.count, s.frequencies || {}));
      if (strata.length > MAX_STRATA) wrap.append(el("div", "more-note", `+ ${strata.length - MAX_STRATA} smaller strata not shown`)); }
    else addCatRow("all", col.count, col.frequencies || {});
    dsets.forEach((ds) => { const dv = ds.vals.filter((v) => v != null); addCatRow(multiSet() ? ds.name : "designs", dv.length, freqFromVals(dv), true); });
    colWrap.append(wrap);
    const lg = el("div", "catlegend");
    catNames.forEach((c) => { const it = el("div", "item"); const sw = el("span", "sw"); sw.style.background = colorMap[c]; it.append(sw); it.append(el("span", null, c)); lg.append(it); });
    colWrap.append(lg);
  }

  // ---------- column header (range + thresholds + chip) ----------
  function buildThreshold(head, mname, cname, col) {
    const key = colKey(mname, cname);
    const wrap = el("div", "thresh");
    const mk = (which, ph) => {
      const inp = el("input"); inp.type = "text"; inp.inputMode = "decimal"; inp.placeholder = ph;
      inp.setAttribute("aria-label", `${cname} ${which}`);
      const cur = (state.thresholds[key] || {})[which];
      if (cur != null) { inp.value = cur; inp.classList.add("set"); }
      inp.addEventListener("input", () => {
        const raw = inp.value.trim(); const num = raw === "" ? null : parseFloat(raw);
        const t = state.thresholds[key] || (state.thresholds[key] = {});
        t[which] = (raw !== "" && isFinite(num)) ? num : null;
        inp.classList.toggle("set", t[which] != null);
        applyFilters();

    };
    wrap.append(el("span", null, "min")); wrap.append(mk("min", col.p1 != null ? fmt(col.p1) : "−∞"));
    wrap.append(el("span", "dash", "–")); wrap.append(mk("max", col.p99 != null ? fmt(col.p99) : "∞")); wrap.append(el("span", null, "max"));

  }
  function renderColumn(metricBox, mname, cname, col) {

    const head = el("div", "colhead");
    const left = el("div", "cname-wrap");
    left.append(el("span", "cname", cname));
    left.append(el("span", "kind", col.kind === "categorical" ? "categorical" : "numeric"));
    const rng = ((INFO[mname] || {}).columns || {})[cname];
    if (col.kind !== "categorical" && rng) { const r = el("span", "range"); r.innerHTML = "range&nbsp;<b>" + esc(rng) + "</b>"; left.append(r); }

    // chip (kept / in-band)

      const update = () => {

        const lab = eff.custom ? "in range" : (col.band_missing ? "loaded" : "in p1–p99");
        chipEl.textContent = `${inb}/${vals.length} ${lab}`;
        chipEl.classList.toggle("warn", inb < vals.length);

      chipUpdaters.push(update); update();
    } else if (hasDesign(cname)) {

    }

  function metricCard(mname, m, idx) {
    const box = el("div", "metric"); box.id = "m-" + mname; box.style.animationDelay = Math.min(idx * 35, 320) + "ms";

    const info = INFO[mname];

  // ---------- main + nav ----------
  function groupedMetrics() {
    const metrics = metricsOf(state.source);
    const names = Object.keys(metrics).filter((m) => matchesQuery(m, metrics[m].columns));
    const groups = new Map(CAT_ORDER.map((c) => [c, []]));
    names.forEach((m) => { const c = catOf(m); if (!groups.has(c)) groups.set(c, []); groups.get(c).push(m); });
    return Array.from(groups.entries()).filter(([, ms]) => ms.length);
  }
  function renderCards() {
    drawers = []; chipUpdaters = [];
    const cards = $("#cards"); cards.innerHTML = "";
    const grouped = groupedMetrics();
    if (!grouped.length) { cards.append(el("div", "empty-state", `no metric or column matches “${state.query}”.`)); return; }
    let idx = 0;
    grouped.forEach(([cat, names]) => {
      const div = el("div", "cat-divider"); div.append(el("span", "ctitle", cat)); div.append(el("span", "rule"));
      div.append(el("span", "cn", names.length + (names.length === 1 ? " metric" : " metrics"))); cards.append(div);
      const metrics = metricsOf(state.source);
      names.forEach((mname) => { cards.append(metricCard(mname, metrics[mname], idx++)); });
    });
    requestAnimationFrame(() => { animate = true; drawers.forEach((f) => f()); animate = false; });
  }
  function buildNav() {
    const nav = $("#nav"); nav.innerHTML = "";
    const metrics = metricsOf(state.source);
    groupedMetricsAll().forEach(([cat, names]) => {
      if (!names.length) return;
      nav.append(el("div", "navcat", cat));
      const ul = el("ul");
      names.forEach((mname) => {
        const matched = matchesQuery(mname, metrics[mname].columns);
        const a = el("a", matched ? "" : "empty"); a.href = "#m-" + mname;
        a.append(el("span", null, mname)); a.append(el("span", "ct", String(Object.keys(metrics[mname].columns).length)));
        a.onclick = (e) => { const t = document.getElementById("m-" + mname); if (t) { e.preventDefault(); t.scrollIntoView({ behavior: "smooth", block: "start" }); } };
        ul.append(a);
      });
      nav.append(ul);
    });
  }
  function groupedMetricsAll() {  // all metrics (nav shows everything, dims non-matches)
    const metrics = metricsOf(state.source);
    const groups = new Map(CAT_ORDER.map((c) => [c, []]));
    Object.keys(metrics).forEach((m) => { const c = catOf(m); if (!groups.has(c)) groups.set(c, []); groups.get(c).push(m); });
    return Array.from(groups.entries()).filter(([, ms]) => ms.length);
  }

  // ---------- right overview (filter cut counts + design-set colours) ----------
  function renderOverview() {
    const ov = $("#overview"); ov.innerHTML = "";
    if (!SETS.length) { ov.append(el("div", "ov-hint", "Load a design batch (--designs) to overlay it and see how many designs fall outside each metric.")); return; }
    if (!state.designs) { ov.append(el("div", "ov-hint", "Designs hidden. Toggle Designs on to view per-metric filter counts.")); return; }

    // design-set colour pickers
    const setsBox = el("div", "ov-sets");
    SETS.forEach((ds, i) => {
      const row = el("div", "ov-set");
      const dot = el("span"); dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${setColor(i) || "var(--design)"};border:1px solid var(--ink)`;
      row.append(dot); row.append(el("span", "nm", ds.name)); row.append(el("span", "cnt", ds.n.toLocaleString()));
      if (multiSet()) {
        const sw = el("div", "ov-swatches");
        SET_PALETTE.forEach((hex) => { const b = el("button"); b.style.background = hex; b.title = hex;
          b.style.color = hex; b.setAttribute("aria-pressed", (setColor(i) === hex));
          b.onclick = () => { state.setColors[i] = hex; renderAll(); }; sw.append(b); });
        row.append(sw);
      }
      setsBox.append(row);
    });
    ov.append(setsBox);

    // per-metric/column cut counts, ordered by category -> metric (same as main)
    const metrics = metricsOf(state.source);
    let anyCustom = false, passSet = null;
    const rows = [];  // {cat, mname, cname, cut, total, custom}
    groupedMetricsAll().forEach(([cat, names]) => {
      names.forEach((mname) => {
        Object.entries(metrics[mname].columns).forEach(([cname, col]) => {
          if (col.kind === "categorical") return;
          const vals = allDesignVals(cname).filter((x) => x != null && isFinite(x));
          if (!vals.length) return;
          const eff = effBand(mname, cname, col);
          const cut = vals.filter((x) => x < eff.min || x > eff.max).length;
          rows.push({ cat, mname, cname, cut, total: vals.length, custom: eff.custom });
          if (eff.custom) {
            anyCustom = true;
            // track global "pass all custom thresholds" over the union of design ids per set
          }
        });
      });
    });

    // global pass over CUSTOM thresholds only (across all sets, per-design)
    if (anyCustom) {
      let totalDesigns = 0, passing = 0;
      SETS.forEach((ds) => {
        for (let r = 0; r < ds.n; r++) {
          totalDesigns++;
          let ok = true;
          for (const k in state.thresholds) {
            const [mn, cn] = k.split("::");
            const col = (metrics[mn] || { columns: {} }).columns[cn]; if (!col) continue;
            const eff = effBand(mn, cn, col); if (!eff.custom) continue;
            const v = (ds.values[cn] || [])[r];
            if (v == null || !isFinite(v)) continue;          // missing value doesn't fail a filter
            if (v < eff.min || v > eff.max) { ok = false; break; }
          }
          if (ok) passing++;
        }
      });
      const p = el("div", "ov-pass"); p.innerHTML = `<b>${passing}</b> / ${totalDesigns} designs pass all set thresholds`;
      ov.append(p);
    }

    let lastCat = null;
    rows.forEach((r) => {
      if (r.cat !== lastCat) { ov.append(el("div", "ov-cat", r.cat)); lastCat = r.cat; }
      const row = el("div", "ov-row" + (r.custom ? " thr" : ""));
      row.title = `${r.mname} · ${r.cname} — ${r.cut} of ${r.total} outside ${r.custom ? "the set range" : "p1–p99"}`;
      row.append(el("span", "name", r.cname));
      const cut = el("span", "cut" + (r.cut > 0 ? " hit" : ""), `${r.cut}`); row.append(cut);
      row.onclick = () => { const t = document.getElementById("m-" + r.mname); if (t) t.scrollIntoView({ behavior: "smooth", block: "start" }); };
      ov.append(row);
    });
    if (!rows.length) ov.append(el("div", "ov-hint", "No numeric design values match the current source / filter."));
  }

  // re-apply thresholds without rebuilding the DOM (keeps input focus)
  function applyFilters() { chipUpdaters.forEach((f) => f()); drawers.forEach((f) => f()); renderOverview(); }
  function registerDraw(fn) { drawers.push(fn); }

  function renderSrcNote() {
    const src = D.sources[state.source]; const note = $("#src-note");
    const strat = state.labeling === "none" ? "pooled" : `stratified by ${state.labeling.replace("_", " ")}`;
    const total = SETS.reduce((a, s) => a + s.n, 0);
    const overlay = state.designs && SETS.length ? ` Overlaying <b style="color:var(--design)">${total}</b> design${total === 1 ? "" : "s"}${multiSet() ? ` across ${SETS.length} sets` : ""}.` : "";
    if (src.no_bands) note.innerHTML = `No reference bands loaded — showing <b style="color:var(--design)">${(src.n_rows || 0).toLocaleString()}</b> designs only.`;
    else note.innerHTML = `Reference bands from <b>${src.label}</b> structures of <b>${(src.n_rows || 0).toLocaleString()}</b> ${(D.reference_set || "reference").toUpperCase()} reference proteins, ${strat}.` + overlay;
  }

  function renderAll() { buildSegs(); renderIdent(); renderSrcNote(); buildNav(); renderCards(); renderOverview(); }

  renderLegend(); setupDesignToggle(); renderAll();
})();
</script>
