<title>Unnatural selection · design reference envelope</title>
<style>
  :root {
    --ink: #0c1719; --ink-2: #0f1e21; --panel: #132a2e; --panel-2: #163035;
    --line: #1f3b40; --line-2: #27474d;
    --bone: #e7efed; --mist: #8aa3a3; --mist-dim: #5e7777;
    --band-core: #2f7f84; --band-mid: #2a5e63; --band-out: #1e4448;
    --median: #bfeae3; --whisker: #4d7176; --nature: #5fb0a6;
    --design: #f0a83a; --design-soft: #f0a83a44;
    --design-out: #e8633a; --design-out-soft: #e8633a33;
    --radius: 9px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  html { overflow-x: clip; }   /* no useless sideways scroll; `clip` keeps position:sticky working */
  body {
    background: radial-gradient(1200px 600px at 78% -8%, #143034 0%, rgba(20,48,52,0) 55%), var(--ink);
    color: var(--bone); font-family: var(--sans); -webkit-font-smoothing: antialiased; line-height: 1.45;
  }
  a { color: inherit; }
  .eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mist-dim); }

  /* ---------- header ---------- */
  header.top { position: sticky; top: 0; z-index: 30; backdrop-filter: blur(10px);
    background: linear-gradient(180deg, rgba(12,23,25,0.96), rgba(12,23,25,0.82));
    border-bottom: 2px solid var(--line-2); box-shadow: 0 10px 26px -12px rgba(0,0,0,0.7); }
  .top-inner { max-width: 1540px; margin: 0 auto; padding: 16px 26px 0; position: relative; }
  .titlerow { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .brand h1 { font-size: clamp(24px, 3vw, 38px); font-weight: 760; letter-spacing: -0.022em; margin: 4px 0 2px; line-height: 1.02; }
  .brand h1 { margin-left: 0; }
  .brand h1 .accent { color: var(--design); }
  .brand h1 .natw { color: var(--nature); }
  .motto { font-family: var(--mono); font-size: 13px; letter-spacing: 0.01em; color: var(--mist); margin: 5px 0 0; }
  .motto .nat { color: var(--nature); font-weight: 600; }
  .motto .ours { color: var(--design); font-weight: 700; }
  .ident { font-family: var(--mono); font-size: 12px; color: var(--mist); display: flex; gap: 16px; flex-wrap: wrap; align-items: baseline; margin-top: 2px; }
  .ident b { color: var(--bone); font-weight: 600; } .ident .dot { color: var(--line-2); }

  .controls { display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-end; padding: 14px 0 12px; }
  .controls .ctl.search { margin-left: auto; }   /* push the search box to the right edge */
  /* header pin/unpin toggle (top-right corner) */
  .hdr-lock { position: absolute; top: 12px; right: 26px; z-index: 31; display: flex; align-items: center; justify-content: center;
    background: var(--ink-2); border: 1px solid var(--line); border-radius: 7px; color: var(--mist); cursor: pointer; padding: 5px 7px; }
  .hdr-lock:hover { color: var(--bone); border-color: var(--line-2); }
  .hdr-lock[aria-pressed="false"] { color: var(--design); border-color: var(--design); }
  .hdr-unlocked header.top { position: static; box-shadow: none; }
  .hdr-unlocked nav.side, .hdr-unlocked aside.overview { top: 12px; max-height: calc(100vh - 24px); }
  .ctl { display: flex; flex-direction: column; gap: 6px; }
  .seg { display: inline-flex; background: var(--ink-2); border: 1px solid var(--line); border-radius: 8px; padding: 3px; gap: 2px; }
  .seg button { font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em; color: var(--mist); background: transparent; border: 0;
    cursor: pointer; padding: 6px 12px; border-radius: 6px; transition: background .15s, color .15s; white-space: nowrap; }
  .seg button:hover { color: var(--bone); }
  .seg button[aria-pressed="true"] { background: var(--panel-2); color: var(--bone); box-shadow: inset 0 0 0 1px var(--line-2); }
  .seg button:focus-visible { outline: 2px solid var(--design); outline-offset: 2px; }
  .search { position: relative; }
  .search input { font-family: var(--mono); font-size: 12.5px; color: var(--bone); background: var(--ink-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 12px 8px 30px; width: 220px; transition: border-color .15s; }
  .search input::placeholder { color: var(--mist-dim); }
  .search input:focus { outline: none; border-color: var(--line-2); }
  .search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--mist-dim); }
  .toggle-designs { display: inline-flex; align-items: center; gap: 9px; cursor: pointer; font-family: var(--mono); font-size: 12px; color: var(--mist);
    background: var(--ink-2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 13px; transition: border-color .15s, color .15s; }
  .toggle-designs:hover { color: var(--bone); }
  .toggle-designs[aria-pressed="true"] { color: var(--bone); border-color: var(--design); }
  .toggle-designs .pip { width: 10px; height: 10px; border-radius: 50%; background: var(--line-2); transition: background .15s; }
  .toggle-designs[aria-pressed="true"] .pip { background: var(--design); box-shadow: 0 0 10px 1px var(--design-soft); }
  .toggle-designs.disabled { opacity: 0.4; cursor: not-allowed; }
  /* the header designs box is now a passive note (inclusion is per-set in the Distributions column) */
  .toggle-designs.note { cursor: default; }
  .toggle-designs.note:hover { color: var(--mist); border-color: var(--line); }

  .legend { border-top: 1px solid var(--line); display: flex; gap: 24px; flex-wrap: wrap; align-items: center; padding: 10px 0 12px;
    font-family: var(--mono); font-size: 11px; color: var(--mist); }
  .legend .grp { display: flex; align-items: center; gap: 9px; }
  .legend .anat { display: inline-flex; align-items: center; height: 16px; border-radius: 3px; overflow: hidden; }
  .legend .needle { width: 9px; height: 9px; border-radius: 50%; background: var(--design); }
  .legend .needle.out { background: var(--design-out); }
  .legend .med { width: 2px; height: 15px; background: var(--median); border-radius: 1px; }

  /* ---------- layout ---------- */
  .shell { max-width: 1540px; margin: 0 auto; padding: 32px 26px 80px; display: grid; grid-template-columns: 184px minmax(0,1fr) 340px; gap: 26px; align-items: start; }
  .col-title { color: var(--design); font-size: 13px; font-weight: 600; }
  main .col-title { padding: 0 0 12px 2px; }
  nav.side, aside.overview { position: sticky; top: calc(var(--header-h, 200px) + 32px); align-self: start;
    max-height: calc(100vh - var(--header-h, 200px) - 44px); overflow-y: auto; overflow-x: hidden; }
  nav.side .eyebrow, aside.overview .eyebrow { padding: 0 0 10px 2px; }
  nav.side ul { list-style: none; margin: 0 0 14px; padding: 0; display: flex; flex-direction: column; gap: 1px; }
  nav.side .navcat { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--nature); padding: 9px 0 4px 2px; }
  nav.side .nav-controls { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .navbtn { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.04em; color: var(--mist); background: var(--ink-2);
    border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; cursor: pointer; }
  .navbtn:hover { color: var(--bone); border-color: var(--line-2); }
  .navitem { display: flex; align-items: center; gap: 2px; border-radius: 6px; }
  .navitem:hover { background: var(--panel); }
  .navitem a { flex: 1; min-width: 0; display: flex; align-items: center; font-family: var(--mono); font-size: 12px; color: var(--mist);
    text-decoration: none; padding: 5px 4px 5px 9px; overflow: hidden; }
  .navitem a .nlabel { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .navitem:hover a { color: var(--bone); }
  .navitem.empty { opacity: 0.32; }
  .navitem.hidden a .nlabel { opacity: 0.5; text-decoration: line-through; }
  .eye { background: none; border: 0; color: var(--mist-dim); cursor: pointer; padding: 4px 7px; display: flex; align-items: center; border-radius: 5px; flex: none; }
  .eye:hover { color: var(--bone); }
  .navitem.hidden .eye { color: var(--design); }
  /* drag-to-reorder */
  .grip { color: var(--mist-dim); cursor: grab; font-size: 12px; line-height: 1; user-select: none; padding-right: 4px; }
  .grip:active { cursor: grabbing; }
  .ov-row .rgrip, .ov-headrow .rgrip, .ov-catrow .rgrip, .ov-subrow .rgrip, .ov-arrow-row .rgrip, .ov-total .rgrip { width: 11px; flex: none; display: flex; align-items: center; justify-content: center; color: var(--mist-dim); font-size: 8px; line-height: 1; }
  .ov-subrow .rgrip { cursor: grab; margin-left: 12px; } .ov-subrow .rgrip:active { cursor: grabbing; }   /* metric subgroup: one level under the category */
  .ov-row .rgrip { cursor: grab; margin-left: 24px; } .ov-row .rgrip:active { cursor: grabbing; }         /* column: one level under its metric subgroup */
  .ov-catrow .rgrip { cursor: grab; color: var(--nature); } .ov-catrow .rgrip:active { cursor: grabbing; }
  .metric.dragging, .ov-row.dragging, .ov-catrow.dragging, .ov-subrow.dragging { opacity: 0.45; }
  .metric.drop-target { box-shadow: 0 -2px 0 0 var(--design); }
  .ov-row.drop-target, .ov-catrow.drop-target, .ov-subrow.drop-target { box-shadow: inset 0 2px 0 0 var(--design); }
  .card-hide { margin-left: auto; align-self: center; background: none; border: 0; color: var(--mist-dim);
    cursor: pointer; padding: 2px 5px; display: flex; align-items: center; border-radius: 5px; }
  .card-hide:hover { color: var(--bone); }

  main { min-width: 0; }
  .src-note { font-family: var(--mono); font-size: 11.5px; color: var(--mist); margin: -2px 0 16px; }
  .src-note b { color: var(--bone); }
  .cat-divider { display: flex; align-items: center; gap: 12px; margin: 26px 0 12px; }
  .metric.is-hidden, .cat-divider.is-hidden { display: none; }   /* hide/search toggle — no DOM rebuild */
  .cat-divider:first-child { margin-top: 4px; }
  .cat-divider .ctitle { font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--nature); font-weight: 600; white-space: nowrap; }
  .cat-divider .rule { height: 1px; background: var(--line); flex: 1; }
  .cat-divider .cn { font-family: var(--mono); font-size: 10.5px; color: var(--mist-dim); }

  .metric { background: linear-gradient(180deg, var(--panel), var(--ink-2)); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; scroll-margin-top: calc(var(--header-h, 200px) + 16px); }
  .metric > .head { cursor: pointer; }
  .metric > .head .chevron { color: var(--mist-dim); font-size: 10px; line-height: 1; transition: transform .15s; transform: none; flex: none; }
  .metric.collapsed > .head .chevron { transform: rotate(-90deg); }
  .metric.collapsed .col { display: none; }
  .metric > .head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; padding: 14px 18px 12px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.012); }
  .metric .mname { font-family: var(--mono); font-size: 14px; letter-spacing: 0.03em; color: var(--bone); font-weight: 600; }
  .metric .mmeta { font-family: var(--mono); font-size: 11px; color: var(--mist-dim); }
  .qmark { display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px; border-radius: 50%;
    border: 1px solid var(--line-2); color: var(--mist); font-family: var(--mono); font-size: 9.5px; line-height: 1; cursor: help;
    user-select: none; flex: none; align-self: center; vertical-align: middle; }
  .qmark:hover { color: var(--bone); border-color: var(--design); }

  .col { padding: 13px 18px 15px; border-bottom: 1px solid var(--line); }
  .col:last-child { border-bottom: 0; }
  .col .colhead { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 9px; flex-wrap: wrap; }
  .col .cname-wrap { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; min-width: 0; }
  .col .cname { font-family: var(--mono); font-size: 12.5px; color: var(--bone); letter-spacing: 0.01em; }
  .col .kind { color: var(--mist-dim); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; }
  .col .range { font-family: var(--mono); font-size: 10px; color: var(--mist-dim); border: 1px solid var(--line); border-radius: 999px; padding: 1px 7px; }
  .col .range b { color: var(--mist); font-weight: 500; }
  .colhead .right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .col .chip { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--design-soft); color: var(--design); border: 1px solid #f0a83a55; white-space: nowrap; }
  .col .chip.warn { background: var(--design-out-soft); color: var(--design-out); border-color: #e8633a55; }
  .col .chip.ghost { background: transparent; color: var(--mist-dim); border: 1px dashed var(--line-2); }
  .thresh { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10.5px; color: var(--mist-dim); }
  .thresh input { font-family: var(--mono); font-size: 11px; color: var(--bone); background: var(--ink-2); border: 1px solid var(--line); border-radius: 6px; padding: 3px 5px; width: 58px; text-align: center; }
  .thresh input:focus { outline: none; border-color: var(--design); }
  .thresh input.set { border-color: var(--design); color: var(--design); }
  .thresh .dash { color: var(--mist-dim); }
  .thresh-reset { display: inline-flex; align-items: center; justify-content: center; margin-left: 2px; padding: 3px; background: none;
    border: 1px solid var(--line); border-radius: 6px; color: var(--mist); cursor: pointer; }
  .thresh-reset:hover { color: var(--design-out); border-color: var(--design-out); }
  .thresh-reset svg { display: block; }
  /* categorical filter — toggle pills (allowed = lit, excluded = dimmed + struck) */
  .catfilter { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 5px; font-family: var(--mono); font-size: 10.5px; }
  .catpill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px 2px 6px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--ink-2); color: var(--mist); cursor: pointer; transition: opacity .12s, border-color .12s, color .12s; }
  .catpill .cp-sw { width: 9px; height: 9px; border-radius: 2px; flex: none; }
  .catpill .cp-lbl { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .catpill.on { color: var(--bone); border-color: var(--line-2); }
  .catpill:not(.on) { opacity: 0.42; }
  .catpill:not(.on) .cp-lbl { text-decoration: line-through; }
  .catpill:hover { border-color: var(--design); }

  /* numeric track rows */
  .axis-row, .track-row { display: grid; grid-template-columns: var(--labw, 124px) 1fr; align-items: center; }
  .axis-row { margin-bottom: 4px; } .track-row { min-height: 30px; } .track-row + .track-row { margin-top: 2px; }
  .strat-label { font-family: var(--mono); font-size: 11px; color: var(--mist); padding-right: 12px; display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
  .strat-label .ct { color: var(--mist-dim); font-size: 10px; }
  .strat-label.overall { color: var(--bone); }
  .track svg { display: block; width: 100%; }
  .more-note { font-family: var(--mono); font-size: 10.5px; color: var(--mist-dim); padding: 7px 0 1px; }

  /* categorical bars */
  .catbar-wrap { display: flex; flex-direction: column; gap: 4px; }
  .catrow { display: grid; grid-template-columns: var(--labw, 124px) 1fr; align-items: center; }
  .catrow .rl { font-family: var(--mono); font-size: 11px; color: var(--mist); padding-right: 12px; display: flex; justify-content: space-between; gap: 6px; }
  .catrow .rl.designs { color: var(--design); }
  .catbar { display: flex; height: 18px; border-radius: 4px; overflow: hidden; background: var(--ink-2); box-shadow: inset 0 0 0 1px var(--line); }
  .catbar span { height: 100%; min-width: 0; }
  .catlegend { display: flex; flex-wrap: wrap; gap: 4px 14px; margin-top: 9px; font-family: var(--mono); font-size: 10.5px; color: var(--mist); }
  .catlegend .item { display: flex; align-items: center; gap: 6px; } .catlegend .sw { width: 10px; height: 10px; border-radius: 3px; }
  .empty-state { font-family: var(--mono); font-size: 12px; color: var(--mist-dim); padding: 40px 4px; text-align: center; }

  /* ---------- design-set key (top of the Distributions column) ---------- */
  .design-sets { display: flex; flex-wrap: wrap; gap: 8px 14px; margin: 4px 0 18px; }
  .ds-chip { display: flex; align-items: center; gap: 7px; padding: 5px 10px; border: 1px solid var(--line-2); border-radius: 999px;
    background: var(--ink-2); font-family: var(--mono); font-size: 11px; color: var(--bone); cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .ds-chip.on { border-color: var(--design); box-shadow: 0 0 9px -3px var(--design-soft); }   /* included = yellow outline (default) */
  .ds-chip:focus-visible { outline: 2px solid var(--design); outline-offset: 2px; }
  .ds-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--ink); flex: none; }
  .ds-nm { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ds-cnt { color: var(--mist-dim); }
  .ds-swatches { display: flex; gap: 4px; margin-left: 4px; padding-left: 8px; border-left: 1px solid var(--line-2); }
  .ds-swatches button { width: 13px; height: 13px; border-radius: 50%; border: 1px solid var(--ink); cursor: pointer; padding: 0; }
  .ds-swatches button[aria-pressed="true"] { box-shadow: 0 0 0 2px var(--ink), 0 0 0 3px currentColor; }

  /* ---------- right overview ---------- */
  .ov-pass { font-family: var(--mono); font-size: 11px; color: var(--mist); margin: 4px 0 14px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--ink-2); }
  .ov-pass b { color: var(--design); }
  /* funnel: NAME | PASS · [ KEPT | pipe | CUT ] — flush rows so the pipe is continuous */
  .ov-headrow, .ov-row, .ov-catrow, .ov-subrow { display: flex; align-items: stretch; height: 21px; padding: 0 6px; }
  .ov-headrow { height: auto; padding: 7px 6px 3px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mist-dim); }
  .ov-row { font-family: var(--mono); font-size: 11px; color: var(--mist); cursor: pointer; }
  .ov-row:hover, .ov-subrow:hover { background: rgba(255,255,255,0.03); }
  .ov-headrow .name, .ov-row .name, .ov-catrow .name, .ov-subrow .name, .ov-arrow-row .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 21px; }
  .ov-catrow .name { color: var(--nature); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; }
  .ov-row.thr .name { color: var(--design); }
  /* metric subgroup header: chevron + bold metric name, between the category header and its columns */
  .ov-subrow { font-family: var(--mono); font-size: 11.5px; color: var(--bone); cursor: pointer; }
  .ov-subrow .name { display: flex; align-items: center; gap: 6px; line-height: normal; }
  .ov-subrow .name .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .ov-subrow .subchev { flex: none; color: var(--mist-dim); font-size: 8px; line-height: 1; transition: transform .15s; }
  .ov-subrow.collapsed .subchev { transform: rotate(-90deg); }
  .ov-subrow:hover .ov-remove { opacity: 1; }
  .ovc-pass, .ovc-kept, .ovc-cut { display: flex; align-items: center; font-variant-numeric: tabular-nums; color: var(--mist-dim); }
  .ovc-pass { width: 38px; justify-content: flex-end; }
  .ovc-kept { width: 44px; justify-content: center; }
  .ovc-cut { width: 24px; justify-content: center; }
  .ovc-pass b, .ovc-kept b { color: var(--design); font-weight: 600; }
  .ovc-cut.hit { color: var(--design-out); font-weight: 600; }
  .ov-grp { display: flex; align-items: stretch; margin-left: 8px; }   /* the KEPT·pipe·CUT cluster, set off from BAND */
  .ovc-pipe { width: 24px; margin: 0 6px; position: relative; }
  .ovc-pipe .pipe { position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
    background: var(--design-soft); border-left: 1px solid #f0a83a88; border-right: 1px solid #f0a83a88; box-sizing: border-box; }
  /* arrow from the pipe tip down into the kept box (sits in the pipe column) */
  .ov-arrow-row { display: flex; align-items: center; height: 15px; padding: 0 6px; }
  .ov-arrow-row .ovc-pipe { display: flex; align-items: flex-start; justify-content: center; }
  .arrowsvg { display: block; }
  .arrowsvg line { stroke: var(--design); stroke-width: 1.2; }
  .arrowsvg path { fill: var(--design); }
  .ov-total { display: flex; align-items: center; margin-top: 1px; padding: 9px 6px;
    border: 1px solid var(--line-2); border-radius: 8px; background: var(--ink-2); font-family: var(--mono); font-size: 11.5px; color: var(--mist); }
  .ov-total .name { flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ov-total b { color: var(--design); font-weight: 700; }
  .ov-total-num { display: flex; align-items: center; justify-content: center; overflow: visible; white-space: nowrap; }
  .ov-extract { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; font-family: var(--mono); font-size: 10.5px;
    color: var(--design); background: var(--design-soft); border: 1px solid #f0a83a55; border-radius: 999px; cursor: pointer; white-space: nowrap; }
  .ov-extract:hover { background: var(--design); color: var(--ink); border-color: var(--design); }
  .ov-extract:disabled { opacity: 0.4; cursor: default; }
  .ov-extract svg { display: block; }

      s.style.background = colorMap[k] || "var(--line-2)"; s.title = `${k}: ${n} (${(100 * n / (total || 1)).toFixed(1)}%)`; bar.append(s); }); return bar; }

  function categoricalColumn(colWrap, mname, cname, col) {
    const catNames = barCatNames(cname, col);
    const dsets = designSetsFor(cname);
    const colorMap = colorForCats(catNames);
    const wrap = el("div", "catbar-wrap"); const strata = strataFor(col);
    const allowed = new Set(catNames);
    const addCatRow = (label, count, freq, isDesign) => {
      const row = el("div", "catrow"); const rl = el("div", "rl" + (isDesign ? " designs" : "")); rl.append(el("span", null, label));
      if (count != null) rl.append(el("span", "ct", count.toLocaleString())); row.append(rl);
      const folded = {}; Object.entries(freq).forEach(([k, n]) => { const key = allowed.has(k) ? k : "other"; folded[key] = (folded[key] || 0) + n; });
      row.append(stackBar(folded, colorMap)); wrap.append(row);
    };
    if (col.band_missing) { if (!dsets.length) { colWrap.append(el("div", "more-note", "no reference band · enable Designs to view the batch values")); return; } }
    else if (strata) { strata.slice(0, MAX_STRATA).forEach(([name, s]) => addCatRow(name, s.count, s.frequencies || {}));
      if (strata.length > MAX_STRATA) wrap.append(el("div", "more-note", `+ ${strata.length - MAX_STRATA} smaller strata not shown`)); }
    else addCatRow("all", col.count, col.frequencies || {});
    dsets.forEach((ds) => {
      if (LARGE) { const f = catFreqCached(ds.idx, cname); addCatRow(multiSet() ? ds.name : "designs", f.nonNull, f.freq, true); }
      else { const dv = ds.vals.filter((v) => v != null); addCatRow(multiSet() ? ds.name : "designs", dv.length, freqFromVals(dv), true); }
    });
    colWrap.append(wrap);
    const lg = el("div", "catlegend");
    catNames.forEach((c) => { const it = el("div", "item"); const sw = el("span", "sw"); sw.style.background = colorMap[c]; it.append(sw); it.append(el("span", null, c)); lg.append(it); });
    colWrap.append(lg);
  }

  // ---------- column header (range + thresholds + chip) ----------
  function buildThreshold(head, mname, cname, col) {
    const key = colKey(mname, cname);
    const inputs = {};
    const wrap = el("div", "thresh");
    const mk = (which, ph) => {
      const inp = el("input"); inp.type = "text"; inp.inputMode = "decimal"; inp.placeholder = ph;
      inp.setAttribute("aria-label", `${cname} ${which}`);
      const cur = (state.thresholds[key] || {})[which];
      if (cur != null) { inp.value = fmt(cur); inp.classList.add("set"); }
      inp.addEventListener("input", () => {
        const raw = inp.value.trim(); const num = raw === "" ? null : parseFloat(raw);
        const t = state.thresholds[key] || (state.thresholds[key] = {});
        t[which] = (raw !== "" && isFinite(num)) ? num : null;
        inp.classList.toggle("set", t[which] != null);
        applyFiltersFor(mname);
      });
      inputs[which] = inp;
      return inp;
    };
    wrap.append(el("span", null, "min")); wrap.append(mk("min", col.p1 != null ? fmt(col.p1) : "−∞"));
    wrap.append(el("span", "dash", "–")); wrap.append(mk("max", col.p99 != null ? fmt(col.p99) : "∞")); wrap.append(el("span", null, "max"));
    // reset — clears a custom threshold back to the default p1–p99 band. Sits to the LEFT of the
    // inputs and always reserves its slot (visibility toggle, not display), so neither the value
    // boxes nor the in-band chip shift when it appears/disappears.
    const reset = el("button", "thresh-reset"); reset.type = "button"; reset.title = "reset to the default p1–p99 band";
    reset.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a5 5 0 1 1 1.6 3.6"/><path d="M3 4.8V8h3.2"/></svg>';
    reset.onclick = (e) => {
      e.stopPropagation();
      delete state.thresholds[key];
      ["min", "max"].forEach((w) => { if (inputs[w]) { inputs[w].value = ""; inputs[w].classList.remove("set"); } });
      applyFiltersFor(mname);
    };
    wrap.prepend(reset);
    const syncReset = () => {
      const t = state.thresholds[key] || {};
      reset.style.visibility = ((t.min != null && isFinite(t.min)) || (t.max != null && isFinite(t.max))) ? "visible" : "hidden";
    };
    syncReset();
    chipUpdaters.push(syncReset);   // re-evaluated on every input + threshold-line drag (via applyFilters)
    threshInputs[key] = inputs;
    head.append(wrap);
  }
  // categorical analogue of buildThreshold: a row of toggle pills (one per design category, coloured
  // to match the stacked bar). Selected = allowed; clicking a pill excludes that category. A reset
  // (left, reserved slot — same as the numeric reset) re-allows everything once anything is excluded.
  function buildCategoryFilter(head, mname, cname, col) {
    const key = colKey(mname, cname);
    const cats = designCatValues(cname);
    if (!cats.length) return;
    const colorMap = colorForCats(barCatNames(cname, col));
    const wrap = el("div", "catfilter");
    const reset = el("button", "thresh-reset"); reset.type = "button"; reset.title = "allow all categories again";
    reset.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a5 5 0 1 1 1.6 3.6"/><path d="M3 4.8V8h3.2"/></svg>';
    reset.onclick = (e) => { e.stopPropagation(); delete state.catExcluded[key]; applyFiltersFor(mname); };
    wrap.append(reset);
    const pills = [];
    cats.forEach((c) => {
      const pill = el("button", "catpill"); pill.type = "button";
      const sw = el("span", "cp-sw"); sw.style.background = colorMap[c] || "var(--line-2)"; pill.append(sw);
      pill.append(el("span", "cp-lbl", c));
      pill.onclick = (e) => {
        e.stopPropagation();
        const ex = state.catExcluded[key] || (state.catExcluded[key] = new Set());
        if (ex.has(c)) ex.delete(c); else ex.add(c);
        if (!ex.size) delete state.catExcluded[key];
        applyFiltersFor(mname);

      wrap.append(pill); pills.push([c, pill]);
    });
    const sync = () => {
      const ex = state.catExcluded[key];
      pills.forEach(([c, pill]) => { const on = !(ex && ex.has(c));
        pill.classList.toggle("on", on); pill.setAttribute("aria-pressed", on);
        pill.title = on ? `allowed — click to exclude “${c}”` : `excluded — click to allow “${c}”`; });
      reset.style.visibility = (ex && ex.size) ? "visible" : "hidden";
    };
    sync();
    chipUpdaters.push(sync);
    head.append(wrap);
  }
  function renderColumn(metricBox, mname, cname, col) {
    const colWrap = el("div", "col");
    const head = el("div", "colhead");
    const left = el("div", "cname-wrap");
    left.append(el("span", "cname", cname));
    const info = INFO[mname];
    if (info && info.explanation) left.append(makeQmark(cname, info.explanation));   // "?" per column → the metric's explanation
    left.append(el("span", "kind", col.kind === "categorical" ? "categorical" : "numeric"));
    const rng = ((INFO[mname] || {}).columns || {})[cname];
    if (col.kind !== "categorical" && rng) { const r = el("span", "range"); r.innerHTML = "range&nbsp;<b>" + esc(rng) + "</b>"; left.append(r); }
    head.append(left);
    const right = el("div", "right");
    if (col.band_missing) right.append(el("div", "chip ghost", "no reference band"));
    // chip (kept / in-band)
    let chipEl = null;
    if (col.kind !== "categorical") {
      chipEl = el("div", "chip"); right.append(chipEl);
      const update = () => {
        const eff = effBand(mname, cname, col);
        let inb, total;
        if (LARGE) {   // cached histogram across included sets — no 10^5 rescan per redraw
          inb = 0; total = 0;
          SETS.forEach((ds, i) => { if (!setIncluded(i) || !ds.values[cname]) return; const h = colHist(i, cname);
            total += h.count; inb += histCountBetween(h, eff.min, eff.max); });
        } else {
          const vals = allDesignVals(cname).filter((x) => x != null && isFinite(x));
          total = vals.length; inb = vals.filter((x) => x >= eff.min && x <= eff.max).length;
        }
        if (!total) { chipEl.style.display = "none"; return; }
        chipEl.style.display = "";
        const lab = eff.custom ? "in range" : (col.band_missing ? "loaded" : "in p1–p99");
        chipEl.textContent = `${inb.toLocaleString()}/${total.toLocaleString()} ${lab}`;
        chipEl.classList.toggle("warn", inb === 0);   // ember only when nothing is in-band
      };
      chipUpdaters.push(update); update();
    } else if (hasDesign(cname)) {
      chipEl = el("div", "chip"); right.append(chipEl);
      const update = () => {
        const cf = catFilterState(mname, cname);
        let total, inb;
        if (LARGE) {
          total = 0; inb = 0;
          SETS.forEach((ds, i) => { if (!setIncluded(i) || !ds.values[cname]) return; const f = catFreqCached(i, cname);
            total += f.nonNull; Object.keys(f.freq).forEach((k) => { if (cf.allowed(k)) inb += f.freq[k]; }); });
        } else {
          const vals = allDesignVals(cname).filter((v) => v != null && v !== "");
          total = vals.length; inb = vals.filter(cf.allowed).length;
        }
        if (!total) { chipEl.style.display = "none"; return; }
        chipEl.style.display = "";
        if (!cf.custom) { chipEl.textContent = `${total.toLocaleString()} designs`; chipEl.classList.remove("warn"); return; }
        chipEl.textContent = `${inb.toLocaleString()}/${total.toLocaleString()} allowed`;
        chipEl.classList.toggle("warn", inb === 0);
      };
      chipUpdaters.push(update); update();
    }
    head.append(right);
    colWrap.append(head);
    // filter controls (second row of header): min/max for numeric, category pills for categorical
    if (col.kind !== "categorical") buildThreshold(head, mname, cname, col);
    else if (hasDesign(cname)) buildCategoryFilter(head, mname, cname, col);
    if (col.kind === "categorical") categoricalColumn(colWrap, mname, cname, col); else numericColumn(colWrap, mname, cname, col);
    metricBox.append(colWrap);
  }

  function metricCard(mname, m, idx) {
    const box = el("div", "metric"); box.id = "m-" + mname; box.style.animationDelay = Math.min(idx * 35, 320) + "ms";
    if (state.collapsed.has(mname)) box.classList.add("collapsed");
    const head = el("div", "head"); head.title = "click to collapse / expand";
    const grip = el("span", "grip", GRIP); grip.title = "drag to reorder"; head.append(grip);
    makeDraggable(grip, box, mname, "metric", onMainDrop);
    head.append(el("span", "chevron", "▾"));
    const nm = el("div", "mname"); nm.append(document.createTextNode(mname)); head.append(nm);
    const info = INFO[mname];
    if (info && info.explanation) head.append(makeQmark(mname, info.explanation));
    head.append(el("div", "mmeta", `${Object.keys(m.columns).length} columns · ${m.design_only ? "design-only (no band)" : "n=" + (m.n_rows || 0).toLocaleString()}`));
    const hideBtn = el("button", "card-hide"); hideBtn.innerHTML = eyeSVG(false); hideBtn.title = "hide metric";
    hideBtn.onclick = (e) => { e.stopPropagation(); state.hidden.add(mname); applyHiddenChange(); };
    head.append(hideBtn);
    head.addEventListener("click", () => {                  // collapse / expand the card
      const collapsed = box.classList.toggle("collapsed");
      if (collapsed) state.collapsed.add(mname);
      else { state.collapsed.delete(mname); requestAnimationFrame(() => redrawMetric(mname)); }
    });
    box.append(head);
    Object.entries(m.columns).forEach(([cname, col]) => renderColumn(box, mname, cname, col));
    return box;
  }

  // ---------- main + nav ----------
  // Build EVERY metric card once (in order); hide/search just toggle a CSS class via
  // applyCardVisibility() — no DOM rebuild. Only order changes (drag) / source / stratify / set
  // toggles rebuild here. This keeps hide / show / search instant even with 10^5 designs.
  function renderCards() {
    drawers = []; chipUpdaters = []; threshInputs = {};
    const cards = $("#cards"); cards.innerHTML = "";
    const metrics = metricsOf(state.source);
    const order = applyOrder(state.mainOrder, defaultMetricOrder());
    let idx = 0, lastCat = null;
    order.forEach((mname) => {                       // category dividers re-derived from the (possibly custom) order
      const cat = catOf(mname);
      if (cat !== lastCat) { const div = el("div", "cat-divider"); div.dataset.cat = cat; div.append(el("span", "ctitle", cat)); div.append(el("span", "rule")); cards.append(div); lastCat = cat; }
      cards.append(metricCard(mname, metrics[mname], idx++));
    });
    const es = el("div", "empty-state"); es.id = "cards-empty"; es.style.display = "none"; cards.append(es);
    applyCardVisibility();
    requestAnimationFrame(() => { animate = true; drawers.forEach((d) => d.fn()); animate = false; });
  }
  // toggle .is-hidden on cards (hidden metric OR search miss) + their category dividers + empty state.
  // Cheap: no rebuild, no SVG redraw. Called on every hide/show/search change.
  function applyCardVisibility() {
    const metrics = metricsOf(state.source);
    const cardsEl = $("#cards"); const kids = cardsEl.children;
    let anyVisible = false;
    for (let i = 0; i < kids.length; i++) {
      const node = kids[i]; if (!node.classList.contains("metric")) continue;
      const m = node.id.slice(2);
      const vis = !state.hidden.has(m) && matchesQuery(m, metrics[m].columns);
      node.classList.toggle("is-hidden", !vis);
      if (vis) anyVisible = true;
    }
    for (let i = 0; i < kids.length; i++) {            // a divider is shown only if a visible card follows it in its block
      if (!kids[i].classList.contains("cat-divider")) continue;
      let has = false;
      for (let j = i + 1; j < kids.length && !kids[j].classList.contains("cat-divider"); j++) {
        if (kids[j].classList.contains("metric") && !kids[j].classList.contains("is-hidden")) { has = true; break; }
      }
      kids[i].classList.toggle("is-hidden", !has);
    }
    const es = $("#cards-empty");
    if (es) { es.style.display = anyVisible ? "none" : "";
      if (!anyVisible) es.textContent = state.query ? `no metric or column matches “${state.query}”.` : "all metrics hidden — use “show all” in the left column."; }
  }
  // hidden-metric changed: revisibility + nav + funnel (filter rows depend on state.hidden). No rebuild.
  function applyHiddenChange() { applyCardVisibility(); buildNav(); renderOverview(); }
  // search changed: only affects which cards show + nav dimming — NOT the funnel. No rebuild, no funnel.
  function applySearchChange() { applyCardVisibility(); buildNav(); }
  function eyeSVG(hidden) {
    return hidden
      ? '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M2.5 8s2.2-3.6 5.5-3.6S13.5 8 13.5 8"/><line x1="3" y1="13" x2="13" y2="3"/></svg>'
      : '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 8s2.4-4 6-4 6 4 6 4-2.4 4-6 4-6-4-6-4z"/><circle cx="8" cy="8" r="1.7"/></svg>';
  }
  function buildNav() {
    const nav = $("#nav"); nav.innerHTML = "";
    const metrics = metricsOf(state.source);
    // bulk hide controls
    const ctrls = el("div", "nav-controls");
    if (Object.keys(metrics).some((m) => !state.hidden.has(m))) {
      const h = el("button", "navbtn", "hide all"); h.title = "hide every metric";
      h.onclick = () => { Object.keys(metrics).forEach((m) => state.hidden.add(m)); applyHiddenChange(); };
      ctrls.append(h);
    }
    if (SETS.length && Object.keys(metrics).some((m) => !state.hidden.has(m) && !hasData(m))) {
      const b = el("button", "navbtn", "hide no-data"); b.title = "hide metrics with no design data in the loaded batch";
      b.onclick = () => { Object.keys(metrics).forEach((m) => { if (!hasData(m)) state.hidden.add(m); }); applyHiddenChange(); };
      ctrls.append(b);
    }
    if (state.hidden.size) {
      const s = el("button", "navbtn", `show all (${state.hidden.size})`);
      s.onclick = () => { state.hidden.clear(); applyHiddenChange(); }; ctrls.append(s);
    }
    if (ctrls.childNodes.length) nav.append(ctrls);

    groupedMetricsAll().forEach(([cat, names]) => {
      if (!names.length) return;
      nav.append(el("div", "navcat", cat));
      const ul = el("ul");
      names.forEach((mname) => {
        const hidden = state.hidden.has(mname);
        const matched = matchesQuery(mname, metrics[mname].columns);
        const li = el("li", "navitem" + (hidden ? " hidden" : "") + (matched ? "" : " empty"));
        const a = el("a"); a.href = "#m-" + mname; a.append(el("span", "nlabel", mname));
        a.onclick = (e) => { if (hidden) { e.preventDefault(); return; } const t = document.getElementById("m-" + mname); if (t) { e.preventDefault(); t.scrollIntoView({ behavior: "smooth", block: "start" }); } };
        li.append(a);
        const eye = el("button", "eye"); eye.innerHTML = eyeSVG(hidden); eye.title = hidden ? "show metric" : "hide metric";
        eye.onclick = (e) => { e.stopPropagation(); e.preventDefault(); if (hidden) state.hidden.delete(mname); else state.hidden.add(mname); applyHiddenChange(); };
        li.append(eye); ul.append(li);
      });
      nav.append(ul);
    });
  }
  function groupedMetricsAll() {  // all metrics (nav shows everything, dims non-matches)
    const metrics = metricsOf(state.source);
    const groups = new Map(CAT_ORDER.map((c) => [c, []]));
    Object.keys(metrics).forEach((m) => { const c = catOf(m); if (!groups.has(c)) groups.set(c, []); groups.get(c).push(m); });
    return Array.from(groups.entries()).filter(([, ms]) => ms.length);
  }

  // the "unused filters" tray above the funnel: filters removed from the pipeline live here and
  // can be re-added with their "+" button or by dragging them back onto the funnel. The tray is
  // itself a drop zone, so a pipeline row dragged onto it is removed.
  function renderUnused(ov, unusedRows) {
    const box = el("div", "ov-unused");
    const head = el("div", "ov-unused-head");
    head.append(el("span", null, unusedRows.length ? `unused filters · ${unusedRows.length}` : "unused filters"));

      head.append(useAll);
    }
    box.append(head);
    if (!unusedRows.length) {
      box.append(el("div", "ov-unused-empty", "Drop a filter here (drag a row's grip, or click its ✕) to take it out of the funnel."));
    } else {
      const chips = el("div", "ov-unused-chips");
      unusedRows.forEach((r) => {
        const chip = el("div", "ov-chip"); chip.title = `${r.mname} · ${r.cname} — drag onto the funnel or click + to re-add`;
        chip.append(el("span", "nm", r.cname));
        const add = el("button", "add"); add.type = "button"; add.innerHTML = "+"; add.title = "add back to the pipeline";
        add.onclick = (e) => { e.stopPropagation(); state.disabledFilters.delete(r.key); renderOverview(); };
        chip.append(add);
        makeDraggable(chip, chip, "UNUSED::" + r.key, "filter", onFilterDrop);
        chips.append(chip);
      });
      box.append(chips);
    }
    makeDropTarget(box, "UNUSED::", "filter", onFilterDrop);
    ov.append(box);
  }

  // ---------- right overview (filter cut counts + design-set colours) ----------
  function renderOverview() {
    const ov = $("#overview"); ov.innerHTML = "";
    if (!SETS.length) { ov.append(el("div", "ov-hint", "Load a design batch (--designs) to overlay it and see how many designs fall outside each metric.")); return; }
    if (!designsActive()) { ov.append(el("div", "ov-hint", "All design sets excluded. Click a set chip in the Distributions column to include it and see per-metric filter counts.")); return; }

    // filter rows in pipeline order (drag-reorderable); funnel applies them in this order.
    // disabled filters are pulled out into the "unused" list above and skipped by the funnel.
    const metrics = metricsOf(state.source);
    const toRow = (k) => {
      const i = k.indexOf("::"); const mname = k.slice(0, i), cname = k.slice(i + 2);
      const mm = metrics[mname]; const col = mm && mm.columns[cname];
      return col ? { cat: catOf(mname), mname, cname, col, key: k } : null;
    };
    const fullOrder = applyOrder(state.filterOrder, defaultFilterKeys());
    const rows = fullOrder.filter((k) => !state.disabledFilters.has(k)).map(toRow).filter(Boolean);
    const unusedRows = fullOrder.filter((k) => state.disabledFilters.has(k)).map(toRow).filter(Boolean);
    if (!rows.length && !unusedRows.length) { ov.append(el("div", "ov-hint", "No filterable design values for the current source (or all hidden).")); return; }

    renderUnused(ov, unusedRows);   // the removable-filters tray, above the funnel

    // For each row compute: PASS = in this metric's band alone (inb/evaluable);
    // KEPT = cumulative survivors applying every filter top→bottom; CUT = removed at THIS
    // step only (survivors_before − survivors_after). Design key = "setIndex:rowIndex".
    const total = SETS.reduce((a, s, i) => a + (setIncluded(i) ? s.n : 0), 0);   // only included sets count
    let keptTotal, keptList;   // keptList() -> [{si,ri,set,id}] of full survivors (lazy in large mode)
    if (LARGE) {
      // typed-array funnel: ONE pass over designs, no per-design string Set. Per-row band-alone
      // counts (inb/evaluable) + a first-failing-row histogram give exact cumulative survivors.
      const R = rows.length;
      // flatten row params into primitive parallel arrays — the hot per-design loop then avoids
      // object-property lookups (rows[k].lo etc.), which dominate at 10^5 designs x ~150 rows.
      const rowIsCat = new Uint8Array(R), rowLo = new Float64Array(R), rowHi = new Float64Array(R), rowEx = new Array(R);
      rows.forEach((r, k) => {
        r.isCat = r.col.kind === "categorical";
        if (r.isCat) { const ex = state.catExcluded[r.key]; r.ex = ex; r.custom = !!(ex && ex.size); rowIsCat[k] = 1; rowEx[k] = r.custom ? ex : null; }
        else { const eff = effBand(r.mname, r.cname, r.col); r.lo = rowLo[k] = eff.min; r.hi = rowHi[k] = eff.max; r.custom = eff.custom; rowEx[k] = null; }
        r.arrs = SETS.map((ds, si) => (setIncluded(si) && ds.values[r.cname]) ? ds.values[r.cname] : null);
      });
      const inbA = new Int32Array(R), evalA = new Int32Array(R), failAt = new Int32Array(R);
      let never = 0;
      for (let si = 0; si < SETS.length; si++) {
        if (!setIncluded(si)) continue;
        const n = SETS[si].n;
        const arrs = new Array(R);            // this set's per-row value array (typed/string), hoisted out of the ri loop
        for (let k = 0; k < R; k++) arrs[k] = rows[k].arrs[si];
        for (let ri = 0; ri < n; ri++) {
          let ff = -1;
          for (let k = 0; k < R; k++) {
            const a = arrs[k]; if (!a) continue;
            const v = a[ri];
            if (rowIsCat[k]) {
              if (v == null || v === "") continue;
              evalA[k]++;
              const ex = rowEx[k];
              if (ex && ex.has(v)) { if (ff < 0) ff = k; } else inbA[k]++;
            } else {
              if (v !== v || v === Infinity || v === -Infinity) continue;
              evalA[k]++;
              if (v < rowLo[k] || v > rowHi[k]) { if (ff < 0) ff = k; } else inbA[k]++;
            }
          }
          if (ff < 0) never++; else failAt[ff]++;
        }
      }
      let prevCum = 0;
      for (let k = 0; k < R; k++) {
        const r = rows[k];
        r.inb = inbA[k]; r.evaluable = evalA[k];
        r.survBefore = total - prevCum; prevCum += failAt[k];
        r.cum = prevCum; r.survivors = total - prevCum; r.stepCut = failAt[k];
      }
      keptTotal = never;
      keptList = () => {            // recomputed on demand (extract); early-break keeps it cheap
        const out = [];
        for (let si = 0; si < SETS.length; si++) {
          if (!setIncluded(si)) continue; const ds = SETS[si], n = ds.n;
          for (let ri = 0; ri < n; ri++) {
            let ok = true;
            for (let k = 0; k < R; k++) {
              const r = rows[k], a = r.arrs[si]; if (!a) continue; const v = a[ri];
              if (r.isCat) { if (v != null && v !== "" && r.ex && r.ex.has(v)) { ok = false; break; } }
              else if (v === v && v !== Infinity && v !== -Infinity && (v < r.lo || v > r.hi)) { ok = false; break; }
            }
            if (ok) out.push({ si, ri, set: ds.name, id: (ds.ids && ds.ids[ri]) || (ds.name + ":" + ri) });
          }
        }
        return out;
      };
    } else {
      const unionFailed = new Set();
      let prevCum = 0;
      rows.forEach((r) => {
        r.isCat = r.col.kind === "categorical";
        const eff = r.isCat ? null : effBand(r.mname, r.cname, r.col);
        const cf = r.isCat ? catFilterState(r.mname, r.cname) : null;
        let evaluable = 0, inb = 0;
        SETS.forEach((ds, si) => {
          if (!setIncluded(si)) return;
          const vals = ds.values[r.cname]; if (!vals) return;
          for (let ri = 0; ri < ds.n; ri++) {
            const v = vals[ri];
            if (r.isCat ? (v == null || v === "") : (v == null || !isFinite(v))) continue;
            evaluable++;
            const out = r.isCat ? !cf.allowed(v) : (v < eff.min || v > eff.max);
            if (out) unionFailed.add(si + ":" + ri); else inb++;   // funnel applies the band / allowed set
          }
        });
        r.inb = inb; r.evaluable = evaluable; r.custom = r.isCat ? cf.custom : eff.custom;
        r.survBefore = total - prevCum;
        r.cum = unionFailed.size;
        r.survivors = total - r.cum;
        r.stepCut = r.cum - prevCum;        // designs cut at THIS step only
        prevCum = r.cum;
      });
      keptTotal = total - unionFailed.size;
      const arr = [];
      SETS.forEach((ds, si) => { if (!setIncluded(si)) return; for (let ri = 0; ri < ds.n; ri++) {
        if (!unionFailed.has(si + ":" + ri)) arr.push({ si, ri, set: ds.name, id: (ds.ids && ds.ids[ri]) || (ds.name + ":" + ri) });
      } });
      keptList = () => arr;
    }

    // the KEPT·pipe·CUT cluster: kept number, the narrowing pipe (∝ survivors/total), cut number
    const grp = (keptHTML, surv, cutText, cutHit) => {
      const g = el("div", "ov-grp");
      const k = el("span", "ovc-kept"); if (keptHTML != null) k.innerHTML = keptHTML; g.append(k);
      const pc = el("span", "ovc-pipe"); const pp = el("span", "pipe");
      pp.style.width = (total ? Math.max(100 * surv / total, 0) : 0) + "%"; pc.append(pp); g.append(pc);
      const c = el("span", "ovc-cut" + (cutHit ? " hit" : "")); if (cutText != null) c.textContent = cutText; g.append(c);
      return g;
    };

    const hd = el("div", "ov-headrow"); hd.append(el("span", "rgrip")); hd.append(el("span", "name"));
    hd.append(el("span", "ovc-pass", "band"));
    const hg = el("div", "ov-grp"); hg.append(el("span", "ovc-kept", "kept")); hg.append(el("span", "ovc-pipe")); hg.append(el("span", "ovc-cut", "cut"));
    hd.append(hg); ov.append(hd);

    // group active rows into metric subgroups (consecutive rows sharing a metric) — mirrors the
    // category › metric › column nesting of the left/main columns. Each subgroup carries its own
    // aggregate funnel state so it can collapse to a single line.
    const segs = [];
    rows.forEach((r) => {
      const last = segs[segs.length - 1];
      if (last && last.mname === r.mname && last.cat === r.cat) last.rows.push(r);
      else segs.push({ cat: r.cat, mname: r.mname, key: r.key, rows: [r] });
    });
    segs.forEach((s) => {
      s.survBefore = s.rows[0].survBefore;
      s.survAfter = s.rows[s.rows.length - 1].survivors;
      s.cut = s.survBefore - s.survAfter;
    });

    const funnel = el("div", "ov-funnel");
    let lastCat = null;
    segs.forEach((seg) => {
      if (seg.cat !== lastCat) {   // category header — draggable (moves the whole category block)
        const ch = el("div", "ov-catrow");
        const cg = el("span", "rgrip", GRIP); cg.title = "drag to move the whole category"; ch.append(cg);
        ch.append(el("span", "name", seg.cat));
        ch.append(el("span", "ovc-pass")); ch.append(grp(null, seg.survBefore, null, false));
        funnel.append(ch); lastCat = seg.cat;
        makeDraggable(cg, ch, "CAT::" + seg.key, "filter", onFilterDrop);
      }
      // metric subgroup header — collapsible, removable (whole group), draggable (moves the group)
      const collapsed = state.filterCollapsed.has(seg.mname);
      const sh = el("div", "ov-subrow" + (collapsed ? " collapsed" : ""));
      const sg = el("span", "rgrip", GRIP); sg.title = `drag to move the whole ${seg.mname} group`; sh.append(sg);
      const sName = el("span", "name");
      sName.append(el("span", "subchev", "▾"));
      sName.append(el("span", "nm", seg.mname));
      const srm = el("button", "ov-remove"); srm.type = "button"; srm.innerHTML = "✕";
      srm.title = `remove the whole ${seg.mname} group from the pipeline`;
      srm.onclick = (e) => { e.stopPropagation(); seg.rows.forEach((r) => state.disabledFilters.add(r.key)); renderOverview(); };
      sName.append(srm); sh.append(sName);
      sh.append(el("span", "ovc-pass"));
      if (collapsed) {   // one line for the whole group: survivors after the group + total cut by it
        sh.append(grp(LARGE ? `<b>${fcount(seg.survAfter)}</b>` : `<b>${seg.survAfter}</b>/${total}`, seg.survAfter, `${fcount(seg.cut)}`, seg.cut > 0));
        sh.title = `${seg.mname} — ${seg.rows.length} filter${seg.rows.length === 1 ? "" : "s"} · KEPT ${seg.survAfter}/${total} after the group, CUT ${seg.cut} across it · click to expand`;
      } else {           // entering-the-group pipe state; the per-column detail follows below
        sh.append(grp(null, seg.survBefore, null, false));
        sh.title = `${seg.mname} — ${seg.rows.length} filter${seg.rows.length === 1 ? "" : "s"} · click to collapse to one line`;
      }
      sh.onclick = () => { if (collapsed) state.filterCollapsed.delete(seg.mname); else state.filterCollapsed.add(seg.mname); renderOverview(); };
      makeDraggable(sg, sh, "SUB::" + seg.key, "filter", onFilterDrop);
      funnel.append(sh);
      if (collapsed) return;   // hide the per-column rows

      seg.rows.forEach((r) => {
        const row = el("div", "ov-row" + (r.custom ? " thr" : ""));
        const bandDesc = r.isCat ? (r.custom ? "allowed categories" : "any category") : (r.custom ? "set range" : "p1–p99");
        row.title = `${r.mname} · ${r.cname} — BAND ${r.inb}/${r.evaluable} in ${bandDesc} (alone); `
          + `KEPT ${r.survivors}/${total} after filters above; CUT ${r.stepCut} at this step`;
        const rgrip = el("span", "rgrip", GRIP); rgrip.title = "drag to reorder filter (or onto the unused tray to remove it)"; row.append(rgrip);
        const nameWrap = el("span", "name"); nameWrap.append(el("span", "nm", r.cname));
        const rm = el("button", "ov-remove"); rm.type = "button"; rm.innerHTML = "✕";
        rm.title = "remove this filter from the pipeline";
        rm.onclick = (e) => { e.stopPropagation(); state.disabledFilters.add(r.key); renderOverview(); };
        nameWrap.append(rm); row.append(nameWrap);
        const pass = el("span", "ovc-pass"); pass.innerHTML = LARGE ? `<b>${fcount(r.inb)}</b>` : `<b>${r.inb}</b>/${r.evaluable}`; row.append(pass);
        row.append(grp(LARGE ? `<b>${fcount(r.survivors)}</b>` : `<b>${r.survivors}</b>/${total}`, r.survivors, `${fcount(r.stepCut)}`, r.stepCut > 0));
        row.onclick = () => { const t = document.getElementById("m-" + r.mname); if (t) t.scrollIntoView({ behavior: "smooth", block: "start" }); };
        makeDraggable(rgrip, row, r.key, "filter", onFilterDrop);
        funnel.append(row);
      });
    });
    if (!rows.length) funnel.append(el("div", "ov-hint", "No active filters — every loaded design is kept. Add one back from the tray above."));
    makeDropTarget(funnel, "PIPE::", "filter", onFilterDrop);   // drop an unused filter here to re-add it
    ov.append(funnel);

    // arrow from the pipe tip down into the kept box, placed in the pipe column
    const arr = el("div", "ov-arrow-row");
    arr.append(el("span", "rgrip")); arr.append(el("span", "name")); arr.append(el("span", "ovc-pass"));
    const ag = el("div", "ov-grp"); ag.append(el("span", "ovc-kept"));
    const ap = el("span", "ovc-pipe");
    ap.innerHTML = '<svg class="arrowsvg" width="9" height="14" viewBox="0 0 9 14" aria-hidden="true"><line x1="4.5" y1="0" x2="4.5" y2="9"/><path d="M4.5 13.5 L0.8 8.5 L8.2 8.5 Z"/></svg>';
    ag.append(ap);
    ag.append(el("span", "ovc-cut")); arr.append(ag); ov.append(arr);

    // kept total — number sits in the pipe column (centred under the pipe)
    const tot = el("div", "ov-total"); tot.append(el("span", "rgrip"));
    const totName = el("span", "name"); totName.append(el("span", "lbl", "designs kept"));
    const exBtn = el("button", "ov-extract"); exBtn.type = "button";
    exBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8"/><path d="M4.5 7L8 10.5 11.5 7"/><path d="M3 13h10"/></svg><span>extract</span>';
    exBtn.title = "Download the kept designs (set, ID + all metric values) as CSV";
    exBtn.disabled = keptTotal === 0;
    exBtn.onclick = (e) => { e.stopPropagation(); extractKeptDesigns(keptList()); };
    totName.append(exBtn); tot.append(totName);
    tot.append(el("span", "ovc-pass"));
    const tg = el("div", "ov-grp"); tg.append(el("span", "ovc-kept"));
    const tn = el("span", "ovc-pipe ov-total-num"); tn.innerHTML = `<b>${fcount(keptTotal)}</b>/${fcount(total)}`;
    tg.append(tn); tg.append(el("span", "ovc-cut")); tot.append(tg); ov.append(tot);
  }

  // download the surviving designs as CSV: set, ID + every metric value (kept = passed all filters
  // for the current source's bands / custom thresholds, in the current pipeline order).
  function extractKeptDesigns(kept) {
    if (!kept || !kept.length) return;
    const cols = [], seen = new Set();
    SETS.forEach((ds) => Object.keys(ds.values).forEach((c) => { if (!seen.has(c)) { seen.add(c); cols.push(c); } }));
    const csvEsc = (v) => { if (v == null || (typeof v === "number" && !isFinite(v))) return "";
      const s = String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
    const header = (multiSet() ? ["set"] : []).concat(["ID"], cols);
    const lines = [header.map(csvEsc).join(",")];
    kept.forEach((k) => {
      const ds = SETS[k.si];
      const row = (multiSet() ? [k.set] : []).concat([k.id], cols.map((c) => { const a = ds.values[c]; return a ? a[k.ri] : null; }));
      lines.push(row.map(csvEsc).join(","));
    });
    // Blob (not a data: URI) so huge large-mode exports don't choke encodeURIComponent.
    const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
    const href = URL.createObjectURL(blob);
    const a = el("a"); a.href = href;
    a.download = `designs_kept_${state.source}_${kept.length}of${SETS.reduce((s, d, i) => s + (setIncluded(i) ? d.n : 0), 0)}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(href), 1000);
  }

  // re-apply thresholds without rebuilding the DOM (keeps input focus)
  function applyFilters() { chipUpdaters.forEach((f) => f()); drawers.forEach((d) => d.fn()); renderOverview(); }
  function redrawMetric(m) { drawers.forEach((d) => { if (d.m === m) d.fn(); }); }
  // a single metric's threshold/category changed → only its own card visuals change; redraw just
  // that card (cheap), refresh all chips, and recompute the funnel. Matters at 10^5 designs / 150
  // cards, where redrawing every card per keystroke/drag would dominate.
  function applyFiltersFor(m) { chipUpdaters.forEach((f) => f()); redrawMetric(m); renderOverview(); }
  function registerDraw(m, fn) { drawers.push({ m, fn }); }

  function renderSrcNote() {
    const src = D.sources[state.source]; const note = $("#src-note");
    const strat = state.labeling === "none" ? "pooled" : `stratified by ${state.labeling.replace("_", " ")}`;
    const total = SETS.reduce((a, s, i) => a + (setIncluded(i) ? s.n : 0), 0);
    const inclSets = SETS.filter((s, i) => setIncluded(i)).length;
    const big = LARGE ? ` <b style="color:var(--nature)">large mode</b> — aggregate density + sampled dots in the cards; the funnel filters all designs exactly.` : "";
    const overlay = designsActive() ? ` Overlaying <b style="color:var(--design)">${total.toLocaleString()}</b> design${total === 1 ? "" : "s"}${multiSet() ? ` across ${inclSets} of ${SETS.length} sets` : ""}.${big}` : "";
    if (src.no_bands) note.innerHTML = `No reference bands loaded — showing <b style="color:var(--design)">${(src.n_rows || 0).toLocaleString()}</b> designs only.`;
    else note.innerHTML = `Reference bands from <b>${src.label}</b> structures of <b>${(src.n_rows || 0).toLocaleString()}</b> ${(D.reference_set || "reference").toUpperCase()} reference proteins, ${strat}.` + overlay;
  }

  function renderAll() { buildSegs(); renderIdent(); renderSrcNote(); renderDesignSets(); buildNav(); renderCards(); renderOverview(); }

  // header pin/unpin: locked (default) keeps the header pinned with the sidebars; unlocked lets it scroll away
  function lockSVG(locked) {
    const shackle = locked ? "M5.4 7.4V5.4a2.6 2.6 0 0 1 5.2 0v2" : "M5.4 7.4V5.4a2.6 2.6 0 0 1 4.7-1.6";
    return '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="3.4" y="7.3" width="9.2" height="6.4" rx="1.3"/><path d="' + shackle + '"/></svg>';
  }
  (function () {
    const btn = $("#hdr-lock"); let locked = true;
    const apply = () => {
      document.documentElement.classList.toggle("hdr-unlocked", !locked);
      btn.setAttribute("aria-pressed", locked);
      btn.innerHTML = lockSVG(locked);
      btn.title = locked ? "Header pinned — click to let it scroll away" : "Header scrolls away — click to pin it";
      syncHeaderH();
    };
    btn.onclick = () => { locked = !locked; apply(); };
    apply();
  })();

  renderLegend(); setupDesignNote(); renderAll();
  syncHeaderH(); requestAnimationFrame(syncHeaderH);   // measure header after initial layout
  if (location.hash === "#bench") window.__bench = { renderAll, renderCards, renderOverview, buildNav, applyHiddenChange, applyCardVisibility, applySearchChange, state };  // inert profiling hook
})();
</script>
